steps:
  # שלב 1: התקן ספריות והקם את בסיס הנתונים
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        python database_setup.py
    # העבר את משתני הסביבה לשלב הזה
    env:
      - 'DB_USER=${_DB_USER}'
      - 'DB_PASS=${_DB_PASS}'
      - 'DB_NAME=${_DB_NAME}'
      - 'INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME}'
      - 'DB_HOST=${_DB_HOST}'
    id: 'Setup'

  # שלב 2: בנה את "קופסת הקוד"
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'me-west1-docker.pkg.dev/$PROJECT_ID/whatsapp-bot-repo/calendar-bot:latest'
      - '.'
    id: 'Build'

  # שלב 3: העלה את הקופסה למחסן
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'me-west1-docker.pkg.dev/$PROJECT_ID/whatsapp-bot-repo/calendar-bot:latest'
    id: 'Push'

  # שלב 4: פרוס את הגרסה החדשה ל-Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'whatsapp-bot-service'
      - '--image'
      - 'me-west1-docker.pkg.dev/$PROJECT_ID/whatsapp-bot-repo/calendar-bot:latest'
      - '--region'
      - 'me-west1'
      - '--quiet'
    id: 'Deploy'

# הגדרות כלליות
options:
  logging: CLOUD_LOGGING_ONLY

