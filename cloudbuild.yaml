steps:
  # Step 1: Install libraries and set up the database
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        python database_setup.py
    # Pass environment variables to this step
    env:
      - 'DB_URL=${_DB_URL}'
    id: 'Setup'

  # Step 2: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'me-west1-docker.pkg.dev/$PROJECT_ID/whatsapp-bot-repo/calendar-bot:latest'
      - '.'
    id: 'Build'

  # Step 3: Push the image to the repository
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'me-west1-docker.pkg.dev/$PROJECT_ID/whatsapp-bot-repo/calendar-bot:latest'
    id: 'Push'

  # Step 4: Deploy the new version to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'calendar-bot'
      - '--image'
      - 'me-west1-docker.pkg.dev/$PROJECT_ID/whatsapp-bot-repo/calendar-bot:latest'
      - '--region'
      - 'us-central1'
      - '--quiet'
    id: 'Deploy'

# General options
options:
  logging: CLOUD_LOGGING_ONLY